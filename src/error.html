<!--
  This page shows up if there's no other error page to show
  If you define a +error.svelte on a route, that will be used instead
-->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>%sveltekit.status% %sveltekit.error.message%</title>
	</head>
  <style>
    html {
      overscroll-behavior: none;
    }
    body {
      background-color: #000;
      position: absolute;
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      padding: 2em;
      scale: 1.5;
    }
    .error > * {
      margin: 0;
      font-family: sans-serif;
      color: #ffffff;
    }
  </style>
	<body>
    <div class="error">
      <h1>%sveltekit.status%</h1>
      <p>%sveltekit.error.message%</p>
    </div>
	</body>
</html>
