<!--
  This page shows up if there's no other error page to show
  If you define a +error.svelte on a route, that will be used instead
-->
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>%sveltekit.status% %sveltekit.error.message%</title>
	</head>
  <style>
    html {
      overscroll-behavior: none;
    }
    body {
      background-color: light-dark(#ffffff, #000000);
      position: absolute;
      width: 100%;
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .error {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: sans-serif;
      padding: 2em;
    }
    .error * {
      margin: 0;
      font-family: sans-serif;
      color: light-dark(#000000, #ffffff);
    }
    .error button, .error input {
      cursor: pointer;
      border: none;
      width: 10em;
      color: light-dark(#ffffff, #000000);
      background-color: light-dark(#000000, #ffffff);
      margin: 0.25em;
    }
  </style>
	<body>
    <div class="error">
      <h1>%sveltekit.status%</h1>
      <p>%sveltekit.error.message%</p>
      <form action="/">
          <input type="submit" value="Home" />
      </form>
      <button onclick="history.back()">Go Back</button>
    </div>
	</body>
</html>
